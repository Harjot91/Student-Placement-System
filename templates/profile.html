<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background:#f4f7fc;
        }
        .profile-card{
            max-width:800px;
            margin:auto;
            border:none;
            border-radius:15px;
        }
        .profile-header{
            background:linear-gradient(135deg,#0d6efd,#4f46e5);
            color:white;
            padding:20px;
            border-radius:15px 15px 0 0;
        }
        .profile-info p{
            font-size:17px;
            margin-bottom:12px;
        }
        .btn-custom{
            min-width:180px;
            margin:5px;
            border-radius:10px;
            font-weight:600;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="card shadow-lg profile-card">
        <div class="profile-header">
            <h2>👤 My Profile</h2>
            <p class="mb-0">Student Placement Portal</p>
        </div>
        <div class="card-body">
            <div class="profile-info">
                <p>
                    <strong>Name:</strong>
                    {{ student[0] }}
                </p>
                <p>
                    <strong>Email:</strong>
                    {{ student[1] }}
                </p>
                <p>
                    <strong>Branch:</strong>
                    {{ student[2] }}
                </p>
                <p>
                    <strong>CGPA:</strong>
                    {{ student[3] }}
                </p>
                <p>
                    <strong>Resume:</strong>
                </p>
                {% if student[4] %}
                    <a href="/resume/{{ student[4] }}"
                       target="_blank"
                       class="btn btn-success btn-custom">
                       View Resume
                    </a>
                {% else %}
                    <div class="alert alert-warning">
                        No Resume Uploaded
                    </div>
                {% endif %}
            </div>
            <hr>
            <div class="text-center">
                <a href="/edit_profile"
                   class="btn btn-warning btn-custom">
                   ✏️ Edit Profile
                </a>
                <a href="/update_resume"
                   class="btn btn-info text-white btn-custom">
                   📄 Update Resume
                </a>
                <a href="/dashboard"
                   class="btn btn-primary btn-custom">
                   Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
