<!DOCTYPE html>
<html>
<head>
    <title>{% if company %}Edit Company{% else %}Add Company{% endif %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>{% if company %}Edit Company{% else %}Add Company{% endif %}</h1>
    <form method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ company[0] if company }}" required>
        </div>
        <div class="form-group">
            <label>Role</label>
            <input type="text" name="role" value="{{ company[1] if company }}" required>
        </div>
        <div class="form-group">
            <label>Package</label>
            <input type="text" name="package" value="{{ company[2] if company }}" required>
        </div>
        <button class="btn" type="submit">Save</button>
    </form>
    <a href="/admin/companies" class="back-link">Back</a>
</div>
</body>
</html>
