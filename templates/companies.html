<!DOCTYPE html>
<html>
<head>
    <title>Companies</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1><h1>🏢 Placement Opportunities</h1></h1>

    <table border="1" width="100%">
    <tr>
        <th>Company</th>
        <th>Package (LPA)</th>
        <th>Eligibility (CGPA)</th>
        <th>Action</th>
    </tr>

    {% for company in companies %}
    <tr>
        <td>{{ company[1] }}</td>
        <td>{{ company[2] }}</td>
        <td>{{ company[3] }}</td>
        <td>
            <a href="/apply/{{ company[1] }}" class="btn">
                Apply
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

</div>

</body>
</html>
