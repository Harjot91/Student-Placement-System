<!DOCTYPE html>
<html>
<head>
    <title>Companies</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
        }
        .container {
            margin-top: 40px;
        }
        .card-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .table th {
            background: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" href="#">🏢 Placement Portal</a>
    <div>
        <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
        <a href="/my_applications" class="btn btn-light btn-sm">My Applications</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="card-box">
        <h2 class="mb-4">🏢 Available Companies</h2>
        <form method="GET" action="/companies" class="mb-3">
    <div class="input-group">
        <input
            type="text"
            name="search"
            class="form-control"
            placeholder="Search Company or Role"
            value="{{ search }}"
        >
        <button class="btn btn-primary">
            Search
        </button>
    </div>
</form>
        <table class="table table-bordered">
    <thead class="table-primary">
        <tr>
            <th>Company ID</th>
            <th>Company</th>
            <th>Role</th>
            <th>Package (LPA)</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for company in companies %}
        <tr>
            <td>{{ company[0] }}</td>
            <td>{{ company[1] }}</td>
            <td>{{ company[2] }}</td>
            <td>{{ company[3] }}</td>
            <td>
                <a href="/apply/{{ company[0] }}"
                   class="btn btn-success btn-sm">
                   Apply
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
    </div>
</div>
</body>
</html>
